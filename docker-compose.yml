services:
  app:
    build: .
    container_name: lanzou-resource-library
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: lanzou-resource-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-qyshuku}
      MYSQL_USER: ${DB_USER:-qyshuku}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_this_db_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_root_password}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: lanzou-resource-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
