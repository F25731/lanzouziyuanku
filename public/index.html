  <style>
      :root { --bg1:#0f172a; --bg2:#1e293b; --line:rgba(148,163,184,.22); --card:rgba(255,255,255,.96); --text:#0f172a; --muted:#64748b; --blue:#2563eb; --blue2:#1d4ed8; --gold:#f59e0b; } * { box-sizing:border-box; } body { font-family: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif; margin:0; color:var(--text); background: radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 32%), radial-gradient(circle at top right, rgba(245,158,11,.16), transparent 28%), linear-gradient(180deg, #eef4ff 0%, #f8fbff 38%, #f5f7fb 100%); } .wrap { max-width:1180px; margin:0 auto; padding:28px 20px 48px; } .card { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:22px; box-shadow:0 18px 50px rgba(15,23,42,.08); margin-bottom:18px; backdrop-filter:blur(10px); } .row { display:flex; gap:12px; flex-wrap:wrap; } input, button, select, textarea { min-height:46px; padding:12px 14px; border-radius:14px; border:1px solid #d7dfef; font-size:14px; transition:.2s ease; } input, textarea, select { flex:1; min-width:220px; background:#fff; color:#0f172a; box-shadow: inset 0 1px 2px rgba(15,23,42,.03); } input:focus, textarea:focus, select:focus { outline:none; border-color:#93c5fd; box-shadow:0 0 0 4px rgba(59,130,246,.13); } button { cursor:pointer; border:none; color:#fff; background:linear-gradient(135deg, var(--blue), var(--blue2)); box-shadow:0 12px 24px rgba(37,99,235,.22); font-weight:700; letter-spacing:.2px; } button:hover { transform:translateY(-1px); box-shadow:0 16px 28px rgba(37,99,235,.28); } button.secondary { background:linear-gradient(135deg, #334155, #475569); box-shadow:0 10px 22px rgba(51,65,85,.18); } .muted { color:var(--muted); font-size:13px; } .small { font-size:12px; } .grid { display:grid; grid-template-columns:1.08fr .92fr; gap:18px; } @media (max-width:900px) { .grid { grid-template-columns:1fr; } .wrap { padding:18px 14px 34px; } .card { border-radius:18px; padding:18px; } } .item { padding:16px 0; border-bottom:1px solid #e8eef7; } .item:last-child { border-bottom:none; } .topbar { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap; } .badge { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; background:rgba(255,255,255,.16); color:#fff; font-size:12px; border:1px solid rgba(255,255,255,.18); } a { color:#1d4ed8; text-decoration:none; } .captcha-box { display:flex; gap:12px; align-items:center; } .captcha-svg { width:120px; height:42px; border:1px solid #d9dbe7; border-radius:12px; background:#fff; display:flex; align-items:center; justify-content:center; overflow:hidden; } .wrap > .card:first-child { position:relative; overflow:hidden; background:linear-gradient(135deg, #0f172a 0%, #1d4ed8 55%, #3b82f6 100%); color:#fff; border:none; padding:28px; box-shadow:0 24px 70px rgba(37,99,235,.22); } .wrap > .card:first-child::after { content:""; position:absolute; right:-60px; top:-60px; width:220px; height:220px; background:radial-gradient(circle, rgba(255,255,255,.25), transparent 65%); } .wrap > .card:first-child h2 { margin:0; font-size:34px; letter-spacing:.4px; } .wrap > .card:first-child .muted, .wrap > .card:first-child #userPanel, .wrap > .card:first-child .small { color:rgba(255,255,255,.86) !important; } #userPanel { min-width:240px; padding:14px 16px; border-radius:18px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.15); backdrop-filter:blur(8px); } .grid .card h3, .wrap > .card:nth-of-type(3) h3, .wrap > .card:nth-of-type(4) h3 { margin:0 0 16px; font-size:24px; } .grid .card { min-height:100%; } .grid .card:first-child { background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); } .grid .card:last-child { background:linear-gradient(180deg, #fffaf0 0%, #ffffff 100%); } .grid .card:last-child h3::after { content:" 热门入口"; font-size:12px; color:#b45309; background:#ffedd5; border-radius:999px; padding:4px 8px; margin-left:8px; vertical-align:middle; } .wrap > .card:nth-of-type(3) { background:linear-gradient(135deg, rgba(37,99,235,.08), rgba(255,255,255,.98) 34%, rgba(245,158,11,.08)); border:1px solid rgba(37,99,235,.16); } .wrap > .card:nth-of-type(3) .row button { min-width:132px; } .wrap > .card:nth-of-type(4) { padding:24px; } .wrap > .card:nth-of-type(4) .row { align-items:center; } .wrap > .card:nth-of-type(4) input { min-height:54px; font-size:15px; } .wrap > .card:nth-of-type(4) button { min-width:140px; min-height:54px; } #results { margin-top:10px; } #results .item { padding:16px; border:1px solid #e8eef7; border-radius:16px; background:#fbfdff; margin-bottom:12px; box-shadow:0 8px 20px rgba(15,23,42,.04); } #results .item b { font-size:16px; }

<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <div>
          <h2 style="margin:0;">蓝奏云资源站</h2>
          <div class="muted">一站式资源搜索</div>
        </div>
        <div id="userPanel" class="muted">未登录</div>
      </div>
    </div>

    <div class="grid" id="authGrid">
        <div class="card" id="authLoginWrap">
        <h3>登录 / 注册</h3>
        <div class="row"><input id="username" placeholder="用户名，至少 3 位"></div>
        <div class="row"><input id="password" type="password" placeholder="密码，至少 6 位"></div>
        <div class="row captcha-box">
          <input id="captcha" placeholder="输入验证码" maxlength="4" style="max-width:180px;min-width:180px;">
          <div id="captchaSvg" class="captcha-svg"></div>
          <button class="secondary" onclick="loadCaptcha()" type="button">刷新验证码</button>
        </div>
        <div class="row">
          <button onclick="registerUser()">注册</button>
          <button class="secondary" onclick="loginUser()">登录</button>
          <button class="secondary" onclick="logoutUser()">退出</button>
        </div>
        <div class="muted small">新用户注册后会自动赠送 1 天会员。注册必须输入验证码。</div>
      </div>

      <div class="card" id="redeemCardWrap" style="display:none;">
        <h3>用户中心</h3>
          <div id="userCenterSummary" class="muted" style="margin:-4px 0 14px;">已登录，可在这里查看会员状态、兑换卡密和进入服务入口。</div>
          <div class="row" id="userCenterActions" style="margin:0 0 12px;">
            <button id="buyEntryBtn2" onclick="goToRedeem()" style="display:none;">购买卡密</button>
            <button class="secondary" onclick="goToVideo()">影视剧</button>
            <button class="secondary" onclick="contactService()">联系客服</button>
            <button class="secondary" onclick="logoutUser()">退出登录</button>
          </div>
        <div class="row"><input id="cardCode" placeholder="输入天卡 / 周卡 / 月卡卡密"></div>
        <div class="row"><button onclick="redeemCard()">立即兑换</button></div>
        <div class="muted small">兑换成功后，会员时间会自动顺延</div>
      </div>
    </div>

    <div class="card">
      <h3>会员服务</h3>
      <div id="serviceNotice" class="muted" style="margin-bottom:10px;">未登录可先搜索资源、查看影视剧或联系客服，登录后可购买卡密并兑换会员。</div>
      <div class="row">
        <button id="buyEntryBtn" onclick="goToRedeem()" style="display:none;">购买卡密</button>
        <button class="secondary" onclick="goToVideo()">影视剧</button>
        <button class="secondary" onclick="contactService()">联系客服</button>
      </div>
      <div class="muted small">登录后可购买卡密并兑换会员，未登录时可先搜索资源、查看影视剧或联系客服。</div>
    </div>

    <div class="card">
      <h3>资源搜索</h3>
      <div class="row">
        <input id="keyword" placeholder="输入文件名关键字，例如：教程 / 安装包 / 软件名">
        <button onclick="searchResources()">搜索</button>
      </div>
      <div id="searchMeta" class="muted"></div>
      <div id="results"></div>
    </div>

  </div>

  <script>
    let currentUser = null;
    let currentCaptchaToken = "";
    let SITE_BUY_URL = "";
    let SITE_VIDEO_URL = "";
    let SITE_CONTACT_TEXT = "客服微信 / QQ / Telegram";

    async function api(url, options = {}) {
      const res = await fetch(url, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      const data = await res.json().catch(() => ({ message: '接口返回异常' }));
      if (!res.ok) throw new Error(data.message || '请求失败');
      return data;
    }

    async function loadSiteConfig() {
      try {
        const data = await api("/api/site-config");
        SITE_BUY_URL = String(data.buyUrl || "").trim();
        SITE_VIDEO_URL = String(data.videoUrl || "").trim();
        SITE_CONTACT_TEXT = String(data.contactText || "客服微信 / QQ / Telegram").trim() || "客服微信 / QQ / Telegram";
      } catch (_) {}
    }

    function updateLandingState() {
        const grid = document.getElementById("authGrid");
        const loginWrap = document.getElementById("authLoginWrap");
        const redeemWrap = document.getElementById("redeemCardWrap");
        const buyEntryBtn = document.getElementById("buyEntryBtn");
          const buyEntryBtn2 = document.getElementById("buyEntryBtn2");
          const memberServiceWrap = document.getElementById("memberServiceWrap");
        const serviceNotice = document.getElementById("serviceNotice");
        const loggedIn = !!currentUser;
        if (grid) {
          grid.style.gridTemplateColumns = "1fr";
          grid.style.maxWidth = "640px";
          grid.style.margin = "0 auto 18px";
        }
        if (loginWrap) loginWrap.style.display = loggedIn ? "none" : "";
        if (redeemWrap) redeemWrap.style.display = loggedIn ? "" : "none";
        if (buyEntryBtn) buyEntryBtn.style.display = loggedIn ? "" : "none";
          if (buyEntryBtn2) buyEntryBtn2.style.display = loggedIn ? "" : "none";
          if (memberServiceWrap) memberServiceWrap.style.display = loggedIn ? "none" : "";
        if (serviceNotice) serviceNotice.textContent = loggedIn ? "已登录，可购买卡密并兑换会员；影视剧和联系客服可继续直接使用。" : "未登录可先搜索资源、查看影视剧或联系客服，登录后可购买卡密并兑换会员。";
      }

      function formatExpireAt(value) {
        const v = String(value || "").trim();
        if (!v) return "无";
        return v.replace("T", " ").replace(".000Z", "").slice(0, 16);
      }

      function renderUser(user) {
        currentUser = user;
        updateLandingState();
        const el = document.getElementById('userPanel');
      if (!user) {
        el.innerHTML = '未登录';
        return;
      }
      const badge = user.membershipActive
        ? '<span class="badge">会员有效</span>'
        : '<span class="badge" style="background:#f1f5f9;color:#475569;">普通用户</span>';
      el.innerHTML = `
        <div><b>${user.username}</b> ${badge}</div>
        <div class="small muted">角色：${user.role}｜到期：${user.membershipExpireAt || '无'}</div>
      `;
    }

    async function loadMe() {
      const data = await api('/api/me');
      renderUser(data.user);
    }

    async function loadCaptcha() {
      const data = await api('/api/captcha?ts=' + Date.now(), { cache: 'no-store' });
      currentCaptchaToken = data.token || '';
      document.getElementById('captchaSvg').innerHTML = data.svg;
    }

    async function registerUser() {
      try {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const captcha = document.getElementById('captcha').value.trim();
        const data = await api('/api/register', {
          method: 'POST',
          body: JSON.stringify({ username, password, captcha, captchaToken: currentCaptchaToken })
        });
        alert(data.message);
        document.getElementById('captcha').value = '';
        renderUser(data.user);
          document.getElementById("username").value = "";
          document.getElementById("password").value = "";
          document.getElementById("captcha").value = "";
          const redeemPanel = document.getElementById("redeemCardWrap");
          if (redeemPanel) redeemPanel.scrollIntoView({ behavior: "smooth", block: "start" });
          loadCaptcha();
      } catch (e) {
        alert(e.message);
        loadCaptcha();
      }
    }

    async function loginUser() {
      try {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const data = await api('/api/login', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });
        alert(data.message);
          renderUser(data.user);
          document.getElementById("username").value = "";
          document.getElementById("password").value = "";
          document.getElementById("captcha").value = "";
          const redeemPanel = document.getElementById("redeemCardWrap");
          if (redeemPanel) redeemPanel.scrollIntoView({ behavior: "smooth", block: "start" });
          loadCaptcha();
        } catch (e) {
        alert(e.message);
      }
    }

    async function logoutUser() {
      try {
        const data = await api('/api/logout', { method: 'POST' });
        alert(data.message);
        renderUser(null);
      } catch (e) {
        alert(e.message);
      }
    }

    async function redeemCard() {
      try {
        const code = document.getElementById('cardCode').value.trim();
        const data = await api('/api/redeem-card', {
          method: 'POST',
          body: JSON.stringify({ code })
        });
        alert(data.message);
        renderUser(data.user);
      } catch (e) {
        alert(e.message);
      }
    }

    async function openDownload(id) {
      try {
        const data = await api('/api/download/' + id);
        if (!data.share_url) {
          alert('当前资源没有分享链接');
          return;
        }
        window.open(data.share_url, '_blank');
      } catch (e) {
        alert(e.message);
      }
    }

    function goToRedeem() {
      if (SITE_BUY_URL) {
        window.open(SITE_BUY_URL, "_blank");
        return;
      }
      const el = document.getElementById("cardCode");
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        el.focus();
      }
    }

    function goToVideo() {
      if (SITE_VIDEO_URL) {
        window.open(SITE_VIDEO_URL, "_blank");
        return;
      }
      alert("影视剧入口暂未配置，请稍后再试。");
    }

    function contactService() {
      alert(SITE_CONTACT_TEXT || "客服微信 / QQ / Telegram");
    }

    async function searchResources() {
        try {
          const q = document.getElementById('keyword').value.trim();
          const data = await api('/api/search?q=' + encodeURIComponent(q));
          const dedupeText = data.deduped
            ? `（去重前 ${data.rawTotal ?? data.total} 条）`
            : '';
          const truncateText = data.truncated
            ? ' 仅对前 800 条命中做去重。'
            : '';
          document.getElementById('searchMeta').innerHTML =
            `共找到 <b>${data.total}</b> 条结果${dedupeText}。` +
            (data.membershipActive
                ? ' 你当前为会员，下载不限次数。'
                : (currentUser
                  ? ' 你当前为普通用户，每天最多可查看 3 次下载链接。'
                  : ' 登录后可查看下载链接，普通用户每天最多 3 次，会员不限。')) +
            truncateText;

          const wrap = document.getElementById('results');
          wrap.innerHTML = data.items.map(item => `
            <div class="item">
              <div><b>${item.file_name}</b></div>
              <div class="muted small">大小：${item.file_size || '-'} ｜ 类型：${item.file_type || '-'} ｜ 时间：${item.file_time || '-'}</div>
              <div style="margin-top:8px;">
                <button onclick="openDownload(${item.id})">查看下载</button>
              </div>
            </div>
          `).join('') || '<div class="muted">没有搜索到内容</div>';
        } catch (e) {
          alert(e.message);
        }
      }

      (async function init() {
      await loadSiteConfig();
      loadMe();
      loadCaptcha();
    })();
  </script>
