<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>后台登录</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f7fb;margin:0;color:#222}
    .wrap{max-width:520px;margin:60px auto;padding:24px}
    .card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
    input,button{width:100%;padding:12px;border-radius:10px;border:1px solid #d9dbe7;font-size:14px;box-sizing:border-box;margin-bottom:12px}
    button{background:#2563eb;color:#fff;border:none;cursor:pointer}
    .muted{color:#64748b;font-size:13px}
    a{color:#1d4ed8;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin-top:0;">管理员后台登录</h2>
      <div class="muted" style="margin-bottom:16px;">这是独立后台登录地址，不再和前台放在同一页面。</div>
      <input id="username" placeholder="管理员用户名">
      <input id="password" type="password" placeholder="管理员密码">
      <button onclick="loginAdmin()">登录后台</button>
      <div class="muted"><a href="/">返回前台首页</a></div>
    </div>
  </div>
  <script>
    async function api(url, options = {}) {
      const res = await fetch(url, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      const data = await res.json().catch(() => ({ message: '接口返回异常' }));
      if (!res.ok) throw new Error(data.message || '请求失败');
      return data;
    }

    async function loginAdmin() {
      try {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const data = await api('/api/admin/login', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });
        location.href = '/admin/dashboard';
      } catch (e) {
        alert(e.message);
      }
    }

    fetch('/api/me', { credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        if (data.user && data.user.role === 'admin') {
          location.href = '/admin/dashboard';
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
